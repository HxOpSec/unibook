# Limit heap so Gradle works with JDK 17 (avoid Java-25-only GC flags).
# If you still get "Unsupported class file major version" or GC warnings,
# set org.gradle.java.home to your JDK-17 path, e.g.:
#   org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-amd64
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
